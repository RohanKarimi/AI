stages:
  - verify
  - build

variables:
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/

verify:
  stage: verify
  image: node:22-alpine
  script:
    - npm ci --cache .npm --prefer-offline --no-audit --no-fund
    - npm run check

build:
  stage: build
  image: node:22-alpine
  needs: ["verify"]
  script:
    - npm ci --cache .npm --prefer-offline --no-audit --no-fund
    - npm run build
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - dist/
