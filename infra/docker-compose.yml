services:
  coordinator:
    build:
      context: ../services/compute-coordinator
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DATA_DIR: /data
      DEV_ALLOW_NODE_REGISTRATION: "true"
      ALLOW_ANONYMOUS_REQUESTS: "true"
      CORS_ORIGIN: ${AIOS_CORS_ORIGIN:-http://localhost:4173,http://localhost:5173}
    ports:
      - "${AIOS_COORDINATOR_PORT:-8787}:8787"
    volumes:
      - coordinator-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/v1/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../apps/web
      args:
        VITE_COMPUTE_API_URL: ${VITE_COMPUTE_API_URL:-http://localhost:8787}
    ports:
      - "${AIOS_WEB_PORT:-4173}:8080"
    depends_on:
      coordinator:
        condition: service_healthy

volumes:
  coordinator-data:
